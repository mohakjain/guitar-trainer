<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Interval Trainer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Interval Trainer</h1>
    <p class="subtitle">hands-free ear training</p>
  </div>
  <button class="gear-btn" id="settingsToggle" onclick="toggleSettings()" aria-label="Settings">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
  <div class="settings-dropdown" id="settingsPanel">
    <div class="setting-group">
      <label>Interval set</label>
      <select id="modeSelect">
        <option value="basic">Basic (unison, 4th, 5th, octave)</option>
        <option value="all">All intervals</option>
        <option value="thirds">Thirds &amp; sixths</option>
        <option value="tense">Tense (2nd, 7th, tritone)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Seconds per interval</label>
      <div class="speed-row">
        <input type="range" id="speedSlider" min="6" max="20" value="10" step="1">
        <span class="speed-val" id="speedLabel">10s</span>
      </div>
    </div>
    <div class="setting-group">
      <label class="toggle-label">
        <input type="checkbox" id="noUnisonToggle">
        <span>Exclude unison</span>
      </label>
    </div>
    <div class="setting-group">
      <label class="toggle-label">
        <input type="checkbox" id="descendingToggle">
        <span>Include descending</span>
      </label>
    </div>
  </div>
</div>

<div class="progress-wrap">
  <div class="state-label" id="stateLabel">Press play to begin</div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-info">
    <span id="countLabel">0 played</span>
    <span id="nextLabel">—</span>
  </div>
</div>

<div class="fretboard-wrap">
  <div class="fret-labels" id="fretLabels"></div>
  <div class="fb-inner" id="fbInner">
    <svg id="connectorSvg"></svg>
  </div>
</div>

<div class="info-row">
  <div class="info-card root-card">
    <div class="lbl">Root</div>
    <div class="val" id="rootDisplay">—</div>
    <div class="sub" id="rootPos">—</div>
  </div>
  <div class="answer-card hidden" id="answerCard">
    <div class="lbl">Interval</div>
    <div class="ans-name" id="intervalName">—</div>
    <div class="ans-sound" id="intervalSound"></div>
    <div class="ans-semi" id="intervalSemi">—</div>
    <div class="ans-hint" id="ansHint">reveals at 50%</div>
  </div>
  <div class="info-card note-card">
    <div class="lbl">Note</div>
    <div class="val" id="noteDisplay">—</div>
    <div class="sub" id="notePos">—</div>
  </div>
</div>

<div class="shape-card hidden" id="shapeCard">
  <div class="slbl">How to find it</div>
  <div class="stext" id="shapeText">—</div>
  <div class="shint" id="shapeHint"></div>
</div>

<div class="legend">
  <span><span class="ldot" style="background:#888"></span>Root</span>
  <span><span class="ldot" style="background:#888"></span>Interval</span>
  <span><span class="ldot" style="background:transparent;border:2px solid var(--anchor-color)"></span>Landmarks</span>
</div>

<div class="controls">
  <button class="btn primary" id="playBtn" onclick="togglePlay()">Play</button>
  <button class="btn" id="skipBtn" onclick="nextInterval()" disabled>Skip</button>
  <button class="btn danger" id="stopBtn" onclick="stopAll()" style="display:none">Stop</button>
</div>

<script type="module" src="js/game.js"></script>
</body>
</html>
