<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Interval Trainer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Interval Trainer</h1>
<p class="subtitle">hands-free ear training</p>

<button class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
  <span>Settings</span>
  <span class="arrow">▾</span>
</button>
<div class="settings" id="settingsPanel">
  <div class="setting-group">
    <label>Interval set</label>
    <select id="modeSelect">
      <option value="basic">Basic (unison, 4th, 5th, octave)</option>
      <option value="all">All intervals</option>
      <option value="thirds">Thirds &amp; sixths</option>
      <option value="tense">Tense (2nd, 7th, tritone)</option>
    </select>
  </div>
  <div class="setting-group">
    <label>Seconds per interval</label>
    <div class="speed-row">
      <input type="range" id="speedSlider" min="6" max="20" value="10" step="1">
      <span class="speed-val" id="speedLabel">10s</span>
    </div>
  </div>
</div>

<div class="progress-wrap">
  <div class="state-label" id="stateLabel">Press play to begin</div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-info">
    <span id="countLabel">0 played</span>
    <span id="nextLabel">—</span>
  </div>
  <div class="phase-indicators">
    <span><span class="phase-dot" id="phaseDotReveal"></span>answer at 50%</span>
    <span><span class="phase-dot" id="phaseDotShape"></span>shape at 75%</span>
  </div>
</div>

<div class="fretboard-wrap">
  <div class="fret-labels" id="fretLabels"></div>
  <div class="fb-inner" id="fbInner">
    <svg id="connectorSvg"></svg>
  </div>
</div>

<div class="info-row">
  <div class="info-card root-card">
    <div class="lbl">Root</div>
    <div class="val" id="rootDisplay">—</div>
    <div class="sub" id="rootPos">—</div>
  </div>
  <div class="answer-card hidden" id="answerCard">
    <div class="lbl">Interval</div>
    <div class="ans-name" id="intervalName">—</div>
    <div class="ans-semi" id="intervalSemi">—</div>
    <div class="ans-hint" id="ansHint">reveals at 50%</div>
  </div>
  <div class="info-card note-card">
    <div class="lbl">Note</div>
    <div class="val" id="noteDisplay">—</div>
    <div class="sub" id="notePos">—</div>
  </div>
</div>

<div class="shape-card hidden" id="shapeCard">
  <div class="slbl">How to find it</div>
  <div class="stext" id="shapeText">—</div>
  <div class="shint" id="shapeHint"></div>
</div>

<div class="legend">
  <span><span class="ldot" style="background:var(--root-color)"></span>Root</span>
  <span><span class="ldot" style="background:var(--ivl-color)"></span>Interval</span>
  <span><span class="ldot" style="background:var(--ivl-color);opacity:0.4;border:1px solid var(--ivl-color)"></span>Other voicings</span>
  <span><span class="ldot" style="background:var(--anchor-color);opacity:0.8"></span>Anchor</span>
</div>

<div class="controls">
  <button class="btn primary" id="playBtn" onclick="togglePlay()">Play</button>
  <button class="btn" id="skipBtn" onclick="nextInterval()" disabled>Skip</button>
  <button class="btn danger" id="stopBtn" onclick="stopAll()" style="display:none">Stop</button>
</div>

<script type="module" src="js/game.js"></script>
</body>
</html>
